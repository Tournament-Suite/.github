name: Bug Report
description: Report a bug or unexpected behavior on the Tournament Suite platform
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below so we can investigate quickly.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the platform is affected?
      options:
        - Organizer Workspace
        - Player Portal (Arena)
        - Developer API
        - Authentication / Login
        - Game Integration
        - Bracket / Tournament
        - Matchmaking
        - Battle Pass / Progression
        - Wallet / Payments
        - Notifications
        - Cloud Gaming
        - Mobile App
        - Other
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      description: Where did the bug occur? (page URL or API endpoint)
      placeholder: https://arena.gamertd.com/...
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what you observed...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Describe the expected behavior...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / Environment
      placeholder: Chrome 125, macOS 14 / iOS 17 / Android 14
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, error messages, console logs — anything that helps.