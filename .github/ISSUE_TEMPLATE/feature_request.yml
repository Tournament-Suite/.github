name: Feature Request
description: Suggest a new feature or improvement for Tournament Suite
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We read every feature request. Please describe what you'd like to see and the problem it solves.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the platform does this relate to?
      options:
        - Organizer Workspace
        - Player Portal (Arena)
        - Developer API / Webhooks
        - Game Integration
        - Bracket / Tournament Formats
        - Matchmaking
        - Battle Pass / Progression
        - Marketplace
        - Fantasy
        - Coaching
        - Wallet / Payments
        - White-Label / Branding
        - Cloud Gaming
        - Mobile App
        - Anti-Cheat
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or gap you're experiencing.
      placeholder: As an organizer / player / developer, I need...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the feature
      description: What would you like to see built or changed?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples from other platforms, or anything else that helps illustrate the idea.